version: "3.8"

services:

  # ──────────────────────────────────────────────────────────────
  # SERVIÇO 1 — Landing Pública
  # parceriapremiada.app.br
  # ──────────────────────────────────────────────────────────────
  parceria_site:
    image: parceria_site:prod
    build:
      context: ../projetos/parceria-premiada/site
      dockerfile: Dockerfile
    networks:
      - starlink
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=starlink
        - "traefik.http.routers.parceria-site.rule=Host(`parceriapremiada.app.br`)"
        - traefik.http.routers.parceria-site.entrypoints=websecure
        - traefik.http.routers.parceria-site.tls=true
        - traefik.http.routers.parceria-site.tls.certresolver=letsencryptresolver
        - traefik.http.services.parceria-site.loadbalancer.server.port=8080

  # ──────────────────────────────────────────────────────────────
  # SERVIÇO 2 — PP Admin (app Next.js isolado)
  # admin.parceriapremiada.app.br
  # ──────────────────────────────────────────────────────────────
  parceria_admin:
    image: parceria_admin:prod
    build:
      context: ../projetos/parceria-premiada/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    networks:
      - starlink
    environment:
      - NODE_ENV=production
      - ADMIN_API_BASE_URL=${ADMIN_API_BASE_URL:-https://admin.parceriapremiada.app.br}
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-https://parceriapremiada.app.br}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        failure_action: rollback
      labels:
        - traefik.enable=true
        - traefik.docker.network=starlink
        - "traefik.http.routers.parceria-admin.rule=Host(`admin.parceriapremiada.app.br`)"
        - traefik.http.routers.parceria-admin.entrypoints=websecure
        - traefik.http.routers.parceria-admin.tls=true
        - traefik.http.routers.parceria-admin.tls.certresolver=letsencryptresolver
        - traefik.http.services.parceria-admin.loadbalancer.server.port=3000
        - traefik.http.services.parceria-admin.loadbalancer.healthcheck.path=/login
        - traefik.http.services.parceria-admin.loadbalancer.healthcheck.interval=30s

networks:
  starlink:
    external: true
